name: Update GitHub Status

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Set "Last seen" status
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python3 << 'EOF'
          import os
          import json
          import urllib.request
          from datetime import datetime, timezone

          token = os.environ['GH_TOKEN']
          username = 'Shineii86'

          # Fetch last event
          req = urllib.request.Request(
              f'https://api.github.com/users/{username}/events/public?per_page=1',
              headers={
                  'Authorization': f'Bearer {token}',
                  'Accept': 'application/vnd.github.v3+json'
              }
          )
          with urllib.request.urlopen(req) as resp:
              events = json.loads(resp.read())

          if not events:
              status_msg = 'No recent activity'
              emoji = '💤'
          else:
              event = events[0]
              last_event = event['created_at']
              event_type = event['type']

              # Calculate relative time
              now = datetime.now(timezone.utc)
              event_time = datetime.fromisoformat(last_event.replace('Z', '+00:00'))
              diff = (now - event_time).total_seconds()

              if diff < 60:
                  relative = 'just now'
                  emoji = '🟢'
              elif diff < 3600:
                  mins = int(diff / 60)
                  relative = f'{mins} minute{"s" if mins > 1 else ""} ago'
                  emoji = '🟢'
              elif diff < 86400:
                  hours = int(diff / 3600)
                  relative = f'{hours} hour{"s" if hours > 1 else ""} ago'
                  emoji = '🔵'
              elif diff < 604800:
                  days = int(diff / 86400)
                  relative = f'{days} day{"s" if days > 1 else ""} ago'
                  emoji = '🟡'
              else:
                  weeks = int(diff / 604800)
                  relative = f'{weeks} week{"s" if weeks > 1 else ""} ago'
                  emoji = '🔴'

              # Event label
              labels = {
                  'PushEvent': 'pushed code',
                  'IssuesEvent': 'opened an issue',
                  'IssueCommentEvent': 'commented',
                  'PullRequestEvent': 'opened a PR',
                  'PullRequestReviewEvent': 'reviewed a PR',
                  'CreateEvent': 'created a branch',
                  'WatchEvent': 'starred a repo',
                  'ForkEvent': 'forked a repo',
                  'ReleaseEvent': 'published a release'
              }
              action = labels.get(event_type, 'active')
              status_msg = f'Last seen: {relative} ({action})'

          # Set status via GraphQL
          query = {
              'query': f'mutation {{ changeUserStatus(input: {{message: "{status_msg}", emoji: "{emoji}"}}) {{ status {{ message emoji }} }} }}'
          }
          req = urllib.request.Request(
              'https://api.github.com/graphql',
              data=json.dumps(query).encode(),
              headers={
                  'Authorization': f'Bearer {token}',
                  'Content-Type': 'application/json'
              },
              method='POST'
          )
          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read())

          print(f'✅ Status: {status_msg} {emoji}')
          EOF
